<div class="dialogue-sizing">
  <app-card>
    <app-card-wrapper>
      <div top>
        <img ngSrc="assets/pictures/tank-game-heading.png" alt="title" width="400"
             height="146" priority>
      </div>
      <div content>

        <div class="text-center">Willkommen beim dem legendären Panzer Spiel! Erstelle dir einen Account, um
          loszulegen! Du hast schon einen Account, dann kannst du dich hier <a
            routerLink="/login"
            class="underline cursor-pointer">
            anmelden
          </a>
        </div>


        <div class="mt-4">
          <div class="input-container">
            <div class="input-description">Name</div>
            <input type="email" [formControl]="registerFormGroup.controls.name">
          </div>

          <div class="input-container">
            <div class="input-description">Email</div>
            <input type="email" [formControl]="registerFormGroup.controls.email">
          </div>

          <div class="input-container">
            <div class="input-description">Password</div>
            <input type="password" [formControl]="registerFormGroup.controls.password" (keyup.enter)="register()">
          </div>
        </div>

        @if (error(); as error) {
          <div class="text-center text-red-500">
            {{ error }}
          </div>
        }
      </div>
      <div bottom>
        <button (click)="register()" [disabled]="registerFormGroup.invalid">Register</button>
      </div>
    </app-card-wrapper>
  </app-card>
</div>
