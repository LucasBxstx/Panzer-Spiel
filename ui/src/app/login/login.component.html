<div class="dialogue-sizing">
  <app-card>
    <app-card-wrapper>
      <div top>
        <img ngSrc="assets/pictures/tank-game-heading.png" alt="title" width="400"
             height="146" priority>
      </div>
      <div content>
        <div class="flex flex-wrap justify-center">
          <div>Willkommen beim dem legendären Panzer Spiel! Logge dich ein, oder</div>
          <a
            routerLink="/register"
            class="underline cursor-pointer">
            Erstelle einen Account
          </a>
          <div>, wenn du noch keinen hast, und starte ins Spiel!</div>
        </div>

        <div class="mt-4">
          <div class="input-container">
            <div class="input-description">Email</div>
            <input type="email" [formControl]="loginFormGroup.controls.email">
          </div>

          <div class="input-container">
            <div class="input-description">Password</div>
            <input type="password" [formControl]="loginFormGroup.controls.password" (keyup.enter)="login()">
          </div>
        </div>

        @if (error(); as error) {
          <div class="text-center text-red-500">
            {{ error }}
          </div>
        }

      </div>
      <div bottom>
        <button (click)="login()" [disabled]="loginFormGroup.invalid">Login</button>
      </div>
    </app-card-wrapper>
  </app-card>
</div>
