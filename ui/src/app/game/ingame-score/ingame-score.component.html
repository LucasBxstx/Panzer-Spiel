<div class="left">
  @if (teamScoreLeft(); as stats) {
    @for (team of stats; track team.id) {
      <app-team-score [teamData]="team"></app-team-score>
    }

  }
</div>
<div class="center">
  <img ngSrc="assets/pictures/tank-game-heading.png" alt="title" width="300"
       height="100" priority>
  <div class="time">
    @if (gameService.timeSinceGameStarted(); as time) {
      <div> {{ time * 1000 | date:'mm:ss':'UTC' }}
      </div>
    }
  </div>

</div>

<div class="right">
  @if (teamScoreRight(); as stats) {
    @for (team of stats; track team.id) {
      <app-team-score [teamData]="team"></app-team-score>
    }

  }
</div>
