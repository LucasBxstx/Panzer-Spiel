<div class="dialogue-sizing">
  <app-card class="relative">
    <app-page-wrapper [navigateTo]="'/'" [backLabel]="'Logout'"
                      [headingLabel]="'Game Mode'" (leavePage)="authService.logout()">
      <div content class="flex flex-col gap-4">
        <button (click)="router.navigate(['/multiplayer'])">Multiplayer</button>
        <button (click)="router.navigate(['/singleplayer'])">Singleplayer</button>
      </div>
    </app-page-wrapper>
  </app-card>
</div>
